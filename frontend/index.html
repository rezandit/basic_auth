<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dev Test - User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .auth-status {
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow-sm p-3 bg-light">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="m-0">Authentication</h5>
                        <div id="authStatus" class="auth-status m-0 text-danger">Not Logged In</div>
                    </div>
                    <hr>
                    <div class="row g-2" id="loginForm">
                        <div class="col-md-5">
                            <input type="email" id="loginEmail" class="form-control" placeholder="Email">
                        </div>
                        <div class="col-md-5">
                            <input type="password" id="loginPassword" class="form-control" placeholder="Password">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-dark w-100" onclick="login()">Login</button>
                        </div>
                    </div>
                    <div id="logoutSection" style="display:none;">
                        <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-4">
                <div class="card shadow-sm p-4 mb-4">
                    <h4 class="mb-3">Add New User</h4>
                    <div class="mb-3">
                        <input type="text" id="name" class="form-control" placeholder="Full Name">
                    </div>
                    <div class="mb-3">
                        <input type="email" id="email" class="form-control" placeholder="Email Address">
                    </div>
                    <div class="mb-3">
                        <input type="password" id="password" class="form-control" placeholder="Password">
                    </div>
                    <button class="btn btn-primary w-100" onclick="addUser()">Save User</button>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="m-0">User List</h4>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th class="text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="userList">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        const API_URL = "http://127.0.0.1:8000";
        let TOKEN = localStorage.getItem('access_token') || null;

        $(document).ready(() => {
            updateAuthUI();
            if (TOKEN) fetchUsers();
        });

        function updateAuthUI() {
            if (TOKEN) {
                $('#authStatus').text('Logged In').removeClass('text-danger').addClass('text-success');
                $('#loginForm').hide();
                $('#logoutSection').show();
            } else {
                $('#authStatus').text('Please login first').removeClass('text-success').addClass('text-danger');
                $('#loginForm').show();
                $('#logoutSection').hide();
                $('#userList').html('<tr><td colspan="4" class="text-center text-muted">Authentication required</td></tr>');
            }
        }

        function login() {
            const payload = {
                email: $('#loginEmail').val(),
                password: $('#loginPassword').val()
            };
            $.ajax({
                url: `${API_URL}/login`,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: (data) => {
                    TOKEN = data.access_token;
                    localStorage.setItem('access_token', TOKEN);
                    updateAuthUI();
                    fetchUsers();
                    alert("Login Success");
                },
                error: (xhr) => alert("Login Failed: " + (xhr.responseJSON?.detail || "Unknown error"))
            });
        }

        function logout() {
            TOKEN = null;
            localStorage.removeItem('access_token');
            updateAuthUI();
        }

        function getHeaders() {
            return TOKEN ? { "Authorization": `Bearer ${TOKEN}` } : {};
        }

        function fetchUsers() {
            $.ajax({
                url: `${API_URL}/users`,
                type: 'GET',
                headers: getHeaders(),
                success: (data) => {
                    let rows = '';
                    data.forEach(user => {
                        rows += `<tr>
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td class="text-center">
                                <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">Delete</button>
                            </td>
                        </tr>`;
                    });
                    $('#userList').html(rows);
                },
                error: (xhr) => {
                    if (xhr.status === 401) {
                        logout();
                        alert("Session expired or invalid token.");
                    }
                }
            });
        }

        function addUser() {
            const payload = {
                name: $('#name').val(),
                email: $('#email').val(),
                password: $('#password').val()
            };
            if (!payload.name || !payload.email || !payload.password) return alert("Fill all fields");

            $.ajax({
                url: `${API_URL}/users`,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: () => {
                    fetchUsers();
                    $('#name, #email, #password').val('');
                    alert("User saved");
                },
                error: (xhr) => alert("Error: " + (xhr.responseJSON?.detail || "Failed"))
            });
        }

        function deleteUser(id) {
            if (!confirm("Are you sure?")) return;
            $.ajax({
                url: `${API_URL}/users/${id}`,
                type: 'DELETE',
                headers: getHeaders(),
                success: () => fetchUsers(),
                error: (xhr) => alert(xhr.responseJSON?.detail || "Failed")
            });
        }
    </script>
</body>

</html>
